---
deprecations:
  - |
    The 'magnum-api-wsgi' wsgi entrypoint has been deprecated will be removed
    in a future release. This is due to changes in Python packaging. Operators
    using the 'magnum-api-wsgi' should migrate away from it. The new module name is
      magnum.wsgi.api:application
    See the `OpenStack goverance page
    <https://governance.openstack.org/tc/goals/completed/2025.2/migrate-from-wsgi-scripts-to-module-paths.html>`_
    for more info.
