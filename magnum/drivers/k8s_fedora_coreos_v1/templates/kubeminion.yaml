heat_template_version: rocky

description: >
  This is a nested stack that defines a single Kubernetes minion, This stack is
  included by an AutoScalingGroup resource in the parent template
  (kubecluster.yaml).

parameters:
  name:
    type: string
    description: server name

  is_upgrade:
    type: boolean
    default: false

  is_resize:
    type: boolean
    description: Flag indicating if the stack is being resized
    default: false

  timestamp_upgrade:
    type: string
    description: A timestamp value that changes on every stack upgrade
    default: ""

  reconciler_version:
    type: string
    description: version tag of the node reconciler binary
    default: ""

  reconciler_binary_url:
    type: string
    description: download URL for the node reconciler binary
    default: ""

  reconciler_binary_url_sha256:
    type: string
    description: sha256 checksum for the node reconciler binary URL content
    default: ""

  reconciler_lock_timeout_seconds:
    type: string
    description: lock timeout for synchronous reconcile runs
    default: "900"

  server_image:
    type: string
    description: glance image used to boot the server

  minion_flavor:
    type: string
    description: flavor to use when booting the server

  nodegroup_role:
    type: string
    description: the role of the nodegroup

  nodegroup_name:
    type: string
    description: the name of the nodegroup where the node belongs

  ssh_key_name:
    type: string
    description: name of ssh key to be provisioned on our server

  ssh_public_key:
    type: string
    description: name of ssh key to be provisioned on our server

  external_network:
    type: string
    description: uuid/name of a network to use for floating ip addresses

  kube_allow_priv:
    type: string
    description: >
      whether or not kubernetes should permit privileged containers.
    constraints:
      - allowed_values: ["true", "false"]

  boot_volume_size:
    type: number
    description: >
      size of the cinder boot volume

  boot_volume_type:
    type: string
    description: >
      type of the cinder boot volume

  docker_volume_size:
    type: number
    description: >
      size of a cinder volume to allocate to docker for container/image
      storage

  docker_volume_type:
    type: string
    description: >
      type of a cinder volume to allocate to docker for container/image
      storage

  docker_storage_driver:
    type: string
    description: docker storage driver name
    default: "devicemapper"

  tls_disabled:
    type: boolean
    description: whether or not to enable TLS

  verify_ca:
    type: boolean
    description: whether or not to validate certificate authority

  kubernetes_port:
    type: number
    description: >
      The port which are used by kube-apiserver to provide Kubernetes
      service.

  cluster_uuid:
    type: string
    description: identifier for the cluster this template is generating

  magnum_url:
    type: string
    description: endpoint to retrieve TLS certs from

  kube_master_ip:
    type: string
    description: IP address of the Kubernetes master server.

  etcd_server_ip:
    type: string
    description: IP address of the Etcd server.

  fixed_network:
    type: string
    description: Network from which to allocate fixed addresses.

  fixed_subnet:
    type: string
    description: Subnet from which to allocate fixed addresses.

  network_driver:
    type: string
    description: network driver to use for instantiating container networks

  flannel_network_cidr:
    type: string
    description: network range for flannel overlay network

  wait_condition_timeout:
    type: number
    description: >
      timeout for the Wait Conditions

  registry_enabled:
    type: boolean
    description: >
      Indicates whether the docker registry is enabled.

  registry_port:
    type: number
    description: port of registry service

  swift_region:
    type: string
    description: region of swift service

  registry_container:
    type: string
    description: >
      name of swift container which docker registry stores images in

  registry_insecure:
    type: boolean
    description: >
      indicates whether to skip TLS verification between registry and backend storage

  registry_chunksize:
    type: number
    description: >
      size fo the data segments for the swift dynamic large objects

  secgroup_kube_minion_id:
    type: string
    description: ID of the security group for kubernetes minion.

  volume_driver:
    type: string
    description: volume driver to use for container storage

  region_name:
    type: string
    description: A logically separate section of the cluster

  http_proxy:
    type: string
    description: http proxy address for docker

  https_proxy:
    type: string
    description: https proxy address for docker

  no_proxy:
    type: string
    description: no proxies for docker

  kube_tag:
    type: string
    description: tag of the k8s containers used to provision the kubernetes cluster

  kube_version:
    type: string
    description: version of kubernetes used for kubernetes cluster

  trustee_domain_id:
    type: string
    description: domain id of the trustee

  trustee_user_id:
    type: string
    description: user id of the trustee

  trustee_username:
    type: string
    description: username of the trustee

  trustee_password:
    type: string
    description: password of the trustee
    hidden: true

  trust_id:
    type: string
    description: id of the trust which is used by the trustee
    hidden: true

  auth_url:
    type: string
    description: >
      url for keystone, must be v2 since k8s backend only support v2
      at this point

  insecure_registry_url:
    type: string
    description: insecure registry url

  container_infra_prefix:
    type: string
    description: >
      prefix of container images used in the cluster, kubernetes components,
      kubernetes-dashboard, coredns etc

  dns_service_ip:
    type: string
    description: >
      address used by Kubernetes DNS service

  dns_cluster_domain:
    type: string
    description: >
      domain name for cluster DNS

  openstack_ca:
    type: string
    description: The OpenStack CA certificate to install on the node.

  nodes_server_group_id:
    type: string
    description: ID of the server group for kubernetes cluster nodes.

  availability_zone:
    type: string
    description: >
      availability zone for master and nodes
    default: ""

  pods_network_cidr:
    type: string
    description: Configure the IP pool/range from which pod IPs will be chosen

  kubelet_options:
    type: string
    description: >
      additional options to be passed to the kubelet

  node_labels:
    type: string
    description: >
      per-nodegroup Kubernetes node labels applied by the reconciler
    default: ""

  node_taints:
    type: string
    description: >
      per-nodegroup Kubernetes node taints applied by the reconciler
    default: ""

  kubeproxy_options:
    type: string
    description: >
      additional options to be passed to the kube proxy

  octavia_enabled:
    type: boolean
    description: >
      whether or not to use Octavia for LoadBalancer type service.
    default: False

  cloud_provider_enabled:
    type: boolean
    description: Enable or disable the openstack kubernetes cloud provider

  heat_container_agent_tag:
    type: string
    description: tag of the heat_container_agent system container
    default: victoria-stable-1

  auto_healing_enabled:
    type: boolean
    description: >
      true if the auto healing feature should be enabled

  os_autoupgrade_enabled:
    type: boolean
    description: >
      true if the OS auto-upgrade service (Zincati) should be enabled
    default: false

  auto_healing_controller:
    type: string
    description: >
      The service to be deployed for auto-healing.
    default: "draino"

  use_podman:
    type: boolean
    description: >
      If true, run system containers for kubernetes, etcd and heat-agent

  selinux_mode:
    type: string
    description: >
      Choose SELinux mode

  container_runtime:
    type: string
    description: The container runtime to install

  kube_service_account_key:
    type: string
    hidden: true
    default: ""
    description: >
      The signed cert will be used to verify the k8s service account tokens
      during authentication.

  kube_service_account_private_key:
    type: string
    hidden: true
    default: ""
    description: >
      The private key will be used to sign the k8s service account tokens.

  ca_rotation_id:
    type: string
    default: ""
    description: Explicit token used to trigger CA rotation.

conditions:
  image_based: { equals: [{ get_param: boot_volume_size }, 0] }
  volume_based:
    not:
      equals:
        - get_param: boot_volume_size
        - 0
resources:
  agent_config:
    type: OS::Heat::SoftwareConfig
    properties:
      group: ungrouped
      config:
        list_join:
          - "\n"
          - - str_replace:
                template: { get_file: user_data.json }
                params:
                  __HOSTNAME__: { get_param: name }
                  __SSH_KEY_VALUE__: { get_param: ssh_public_key }
                  __OPENSTACK_CA__: { get_param: openstack_ca }
                  __CONTAINER_INFRA_PREFIX__:
                    if:
                      - equals:
                          - get_param: container_infra_prefix
                          - ""
                      - "docker.io/openstackmagnum/"
                      - get_param: container_infra_prefix
                  __HEAT_CONTAINER_AGENT_TAG__:
                    { get_param: heat_container_agent_tag }
                  __HTTP_PROXY__: { get_param: http_proxy }
                  __HTTPS_PROXY__: { get_param: https_proxy }
                  __NO_PROXY__: { get_param: no_proxy }
                  __SELINUX_MODE__: { get_param: selinux_mode }

  ######################################################################
  #
  # software configs.  these are components that are combined into
  # a multipart MIME user-data archive.
  #

  node_config:
    type: OS::Heat::SoftwareConfig
    properties:
      group: script
      outputs:
        - name: reconcile_status
          description: Magnum bootstrap reconciler status
        - name: reconcile_step
          description: Magnum bootstrap reconciler step
        - name: reconcile_summary
          description: Magnum bootstrap reconciler summary
        - name: reconcile_reason
          description: Magnum bootstrap reconciler reason
        - name: reconcile_error_code
          description: Magnum bootstrap reconciler error code
        - name: reconcile_failure
          description: Magnum bootstrap reconciler failure reason
          error_output: true
      inputs:
        - name: OS_STACK_ID
        - name: INSTANCE_NAME
        - name: IS_UPGRADE
        - name: IS_RESIZE
        - name: KUBE_ALLOW_PRIV
        - name: KUBE_MASTER_IP
        - name: KUBE_API_PORT
        - name: KUBE_NODE_PUBLIC_IP
        - name: KUBE_NODE_IP
        - name: ETCD_SERVER_IP
        - name: DOCKER_VOLUME
        - name: DOCKER_VOLUME_SIZE
        - name: DOCKER_STORAGE_DRIVER
        - name: NETWORK_DRIVER
        - name: REGISTRY_ENABLED
        - name: REGISTRY_PORT
        - name: SWIFT_REGION
        - name: REGISTRY_CONTAINER
        - name: REGISTRY_INSECURE
        - name: REGISTRY_CHUNKSIZE
        - name: TLS_DISABLED
        - name: VERIFY_CA
        - name: CLUSTER_UUID
        - name: MAGNUM_URL
        - name: VOLUME_DRIVER
        - name: REGION_NAME
        - name: HTTP_PROXY
        - name: HTTPS_PROXY
        - name: NO_PROXY
        - name: KUBE_TAG
        - name: FLANNEL_NETWORK_CIDR
        - name: PODS_NETWORK_CIDR
        - name: KUBE_VERSION
        - name: TRUSTEE_USER_ID
        - name: TRUSTEE_USERNAME
        - name: TRUSTEE_PASSWORD
        - name: TRUSTEE_DOMAIN_ID
        - name: TRUST_ID
        - name: AUTH_URL
        - name: CLOUD_PROVIDER_ENABLED
        - name: INSECURE_REGISTRY_URL
        - name: CONTAINER_INFRA_PREFIX
        - name: HEAT_CONTAINER_AGENT_TAG
        - name: DNS_SERVICE_IP
        - name: DNS_CLUSTER_DOMAIN
        - name: KUBELET_OPTIONS
        - name: NODE_LABELS
        - name: NODE_TAINTS
        - name: KUBEPROXY_OPTIONS
        - name: OCTAVIA_ENABLED
        - name: KUBE_SERVICE_ACCOUNT_KEY
        - name: KUBE_SERVICE_ACCOUNT_PRIVATE_KEY
        - name: CA_ROTATION_ID
        - name: AUTO_HEALING_ENABLED
        - name: AUTO_HEALING_CONTROLLER
        - name: NODEGROUP_ROLE
        - name: NODEGROUP_NAME
        - name: USE_PODMAN
        - name: CONTAINER_RUNTIME
        - name: OS_AUTOUPGRADE_ENABLED
        - name: RECONCILER_VERSION
        - name: RECONCILER_BINARY_URL
        - name: RECONCILER_BINARY_URL_SHA256
        - name: RECONCILER_LOCK_TIMEOUT_SECONDS
      config:
        list_join:
          - "\n"
          - - {get_file: ../../common/templates/kubernetes/bootstrap/write-heat-params.sh}
            - get_file: ../../common/templates/kubernetes/bootstrap/install-reconciler-launcher.sh
            - get_file: ../../common/templates/kubernetes/bootstrap/install-reconciler-systemd.sh
            - get_file: ../../common/templates/kubernetes/bootstrap/run-reconciler-once.sh

  node_config_deployment:
    type: OS::Heat::SoftwareDeployment
    properties:
      signal_transport: HEAT_SIGNAL
      config: { get_resource: node_config }
      server: { get_resource: kube-minion }
      actions: ["CREATE", "UPDATE"]
      input_values:
        OS_STACK_ID: { get_param: "OS::stack_id" }
        timestamp_upgrade: { get_param: timestamp_upgrade }
        INSTANCE_NAME: { get_param: name }
        IS_UPGRADE: { get_param: is_upgrade }
        IS_RESIZE: { get_param: is_resize }
        KUBE_ALLOW_PRIV: { get_param: kube_allow_priv }
        KUBE_MASTER_IP: { get_param: kube_master_ip }
        KUBE_API_PORT: { get_param: kubernetes_port }
        KUBE_NODE_PUBLIC_IP: { get_attr: [kube_minion_floating, floating_ip_address] }
        KUBE_NODE_IP: { get_attr: [kube_minion_eth0, fixed_ips, 0, ip_address] }
        ETCD_SERVER_IP: { get_param: etcd_server_ip }
        DOCKER_VOLUME: { get_resource: docker_volume }
        DOCKER_VOLUME_SIZE: { get_param: docker_volume_size }
        DOCKER_STORAGE_DRIVER: { get_param: docker_storage_driver }
        NETWORK_DRIVER: { get_param: network_driver }
        REGISTRY_ENABLED: { get_param: registry_enabled }
        REGISTRY_PORT: { get_param: registry_port }
        SWIFT_REGION: { get_param: swift_region }
        REGISTRY_CONTAINER: { get_param: registry_container }
        REGISTRY_INSECURE: { get_param: registry_insecure }
        REGISTRY_CHUNKSIZE: { get_param: registry_chunksize }
        TLS_DISABLED: { get_param: tls_disabled }
        VERIFY_CA: { get_param: verify_ca }
        CLUSTER_UUID: { get_param: cluster_uuid }
        MAGNUM_URL: { get_param: magnum_url }
        VOLUME_DRIVER: { get_param: volume_driver }
        REGION_NAME: { get_param: region_name }
        HTTP_PROXY: { get_param: http_proxy }
        HTTPS_PROXY: { get_param: https_proxy }
        NO_PROXY: { get_param: no_proxy }
        KUBE_TAG: { get_param: kube_tag }
        FLANNEL_NETWORK_CIDR: { get_param: flannel_network_cidr }
        PODS_NETWORK_CIDR: { get_param: pods_network_cidr }
        KUBE_VERSION: { get_param: kube_version }
        TRUSTEE_USER_ID: { get_param: trustee_user_id }
        TRUSTEE_USERNAME: { get_param: trustee_username }
        TRUSTEE_PASSWORD: { get_param: trustee_password }
        TRUSTEE_DOMAIN_ID: { get_param: trustee_domain_id }
        TRUST_ID: { get_param: trust_id }
        AUTH_URL: { get_param: auth_url }
        CLOUD_PROVIDER_ENABLED: { get_param: cloud_provider_enabled }
        INSECURE_REGISTRY_URL: { get_param: insecure_registry_url }
        CONTAINER_INFRA_PREFIX: { get_param: container_infra_prefix }
        HEAT_CONTAINER_AGENT_TAG: { get_param: heat_container_agent_tag }
        DNS_SERVICE_IP: { get_param: dns_service_ip }
        DNS_CLUSTER_DOMAIN: { get_param: dns_cluster_domain }
        KUBELET_OPTIONS: { get_param: kubelet_options }
        NODE_LABELS: { get_param: node_labels }
        NODE_TAINTS: { get_param: node_taints }
        KUBEPROXY_OPTIONS: { get_param: kubeproxy_options }
        OCTAVIA_ENABLED: { get_param: octavia_enabled }
        KUBE_SERVICE_ACCOUNT_KEY: { get_param: kube_service_account_key }
        KUBE_SERVICE_ACCOUNT_PRIVATE_KEY: { get_param: kube_service_account_private_key }
        CA_ROTATION_ID: { get_param: ca_rotation_id }
        AUTO_HEALING_ENABLED: { get_param: auto_healing_enabled }
        AUTO_HEALING_CONTROLLER: { get_param: auto_healing_controller }
        OS_AUTOUPGRADE_ENABLED: { get_param: os_autoupgrade_enabled }
        NODEGROUP_ROLE: { get_param: nodegroup_role }
        NODEGROUP_NAME: { get_param: nodegroup_name }
        USE_PODMAN: { get_param: use_podman }
        CONTAINER_RUNTIME: { get_param: container_runtime }
        RECONCILER_VERSION: { get_param: reconciler_version }
        RECONCILER_BINARY_URL: { get_param: reconciler_binary_url }
        RECONCILER_BINARY_URL_SHA256: { get_param: reconciler_binary_url_sha256 }
        RECONCILER_LOCK_TIMEOUT_SECONDS: { get_param: reconciler_lock_timeout_seconds }

  ######################################################################
  #
  # a single kubernetes minion.
  #

  # do NOT use "_" (underscore) in the Nova server name
  # it creates a mismatch between the generated Nova name and its hostname
  # which can lead to weird problems
  kube-minion:
    type: OS::Nova::Server
    properties:
      name: { get_param: name }
      flavor: { get_param: minion_flavor }
      image: { get_param: server_image }
      user_data: { get_resource: agent_config }
      user_data_format: SOFTWARE_CONFIG
      software_config_transport: POLL_SERVER_HEAT
      # user_data is first-boot-only and now only bootstraps the reconciler.
      # Node convergence is owned by the reconciler (node_config
      # SoftwareDeployment + periodic timer), so user_data drift must NOT
      # rebuild a running node. Heat's default REPLACE collides on the
      # retained kube_minion_eth0 port ("Port not usable for instance").
      user_data_update_policy: IGNORE
      networks:
        - port: { get_resource: kube_minion_eth0 }
      scheduler_hints: { group: { get_param: nodes_server_group_id } }
      availability_zone: { get_param: availability_zone }

  kube_minion_eth0:
    type: OS::Neutron::Port
    properties:
      network: { get_param: fixed_network }
      security_groups:
        - get_param: secgroup_kube_minion_id
      fixed_ips:
        - subnet: { get_param: fixed_subnet }
      allowed_address_pairs:
        - ip_address: { get_param: pods_network_cidr }
      replacement_policy: AUTO

  kube_minion_floating:
    type: Magnum::Optional::KubeMinion::Neutron::FloatingIP
    properties:
      floating_network: { get_param: external_network }
      port_id: { get_resource: kube_minion_eth0 }
    depends_on: kube-minion

  ######################################################################
  #
  # docker storage.  This allocates a cinder volume and attaches it
  # to the minion.
  #

  docker_volume:
    type: Magnum::Optional::Cinder::Volume
    properties:
      size: { get_param: docker_volume_size }
      volume_type: { get_param: docker_volume_type }
      availability_zone: { get_param: availability_zone }

  docker_volume_attach:
    type: Magnum::Optional::Cinder::VolumeAttachment
    properties:
      instance_uuid: { get_resource: kube-minion }
      volume_id: { get_resource: docker_volume }
      mountpoint: /dev/vdb

outputs:
  kube_minion_ip:
    value: { get_attr: [kube_minion_eth0, fixed_ips, 0, ip_address] }
    description: >
      This is the "public" IP address of the Kubernetes minion node.

  kube_minion_external_ip:
    value: { get_attr: [kube_minion_floating, floating_ip_address] }
    description: >
      This is the "public" IP address of the Kubernetes minion node.

  ######################################################################
  #
  # NOTE(flwang): Returning the minion node server ID here so that
  # consumer can send API request to Heat to remove a particular
  # node with removal_policies. Otherwise, the consumer (e.g. AutoScaler)
  # has to use index to do the remove which is confusing out of the
  # OpenStack world.
  # https://storyboard.openstack.org/#!/story/2005054
  #
  ######################################################################

  OS::stack_id:
    value: { get_resource: kube-minion }
    description: >
      This is the Nova server id of the node.
